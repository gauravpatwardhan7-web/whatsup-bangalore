name: Weekly newsletter

# Every Thursday at 03:30 UTC (~09:00 IST): top-10 trending digest to all users.
# Needs the RESEND_API_KEY secret (and optionally NEWSLETTER_FROM once a domain
# is verified in Resend); without it the run is a harmless dry run.
on:
  schedule:
    - cron: "30 3 * * 4"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build the email without sending"
        type: boolean
        default: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Send newsletter
        run: npm run newsletter ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '-- --dry-run' || '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_FROM: ${{ secrets.NEWSLETTER_FROM }}
